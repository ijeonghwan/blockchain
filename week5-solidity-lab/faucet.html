<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faucet - MetaMask Wallet</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e27;--surface:#111633;--elevated:#1a1f4a;
  --cyan:#00d4ff;--purple:#7c3aed;--green:#10b981;--orange:#f59e0b;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--border:#2a2f5a;
  --font-code:'Fira Code','Consolas',monospace;
  --font-ui:'Segoe UI','Malgun Gothic',sans-serif;
}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(0,212,255,.06),transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(124,58,237,.06),transparent 60%)}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.container{position:relative;z-index:1;width:100%;max-width:480px;padding:20px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple),var(--green))}

.logo{text-align:center;margin-bottom:28px}
.logo-icon{font-size:48px;margin-bottom:8px}
.logo h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo p{color:var(--muted);font-size:13px;margin-top:4px}

.info-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.info-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--elevated);border-radius:12px;border:1px solid var(--border)}
.info-item .label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px}
.info-item .label .icon{font-size:16px}
.info-item .value{font-size:14px;font-family:var(--font-code);color:var(--text);font-weight:600}
.info-item .value.cyan{color:var(--cyan)}
.info-item .value.green{color:var(--green)}
.info-item .value.orange{color:var(--orange)}

.wallet-section{margin-bottom:24px}
.wallet-addr{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--elevated);border-radius:12px;border:1px solid rgba(16,185,129,.3);margin-bottom:12px}
.wallet-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 8px rgba(16,185,129,.5)}
.wallet-addr .addr{font-family:var(--font-code);font-size:13px;color:var(--green);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wallet-addr .copy-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:.2s}
.wallet-addr .copy-btn:hover{color:var(--cyan);background:rgba(0,212,255,.1)}

.btn{width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-connect{background:linear-gradient(135deg,var(--orange),#d97706);color:#fff;margin-bottom:12px}
.btn-connect:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 4px 20px rgba(245,158,11,.3)}

.btn-request{background:linear-gradient(135deg,var(--cyan),#0091b3);color:#fff}
.btn-request:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 4px 20px rgba(0,212,255,.3)}

.btn-disconnect{background:rgba(239,68,68,.12);color:var(--red);font-size:13px;padding:10px;margin-top:12px;border:1px solid rgba(239,68,68,.2)}
.btn-disconnect:hover{background:rgba(239,68,68,.2)}

.status{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:13px;text-align:center;display:none;animation:fadeIn .3s}
.status.success{display:block;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.status.error{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.status.info{display:block;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);color:var(--cyan)}

.network-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;background:rgba(124,58,237,.12);color:var(--purple);border:1px solid rgba(124,58,237,.25);margin-top:4px}
.network-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--purple)}

.footer{text-align:center;margin-top:20px;font-size:11px;color:var(--muted)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.3)}50%{box-shadow:0 0 0 8px rgba(0,212,255,0)}}
.loading .btn-icon{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none !important}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🚰</div>
      <h1>Faucet</h1>
      <p>테스트 ETH를 받아보세요</p>
      <div class="network-badge" id="networkBadge" style="display:none"><span class="dot"></span><span id="networkName">-</span></div>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <span class="label"><span class="icon">💰</span> Faucet 잔액</span>
        <span class="value cyan" id="faucetBalance">- ETH</span>
      </div>
      <div class="info-item">
        <span class="label"><span class="icon">🎁</span> 요청 금액</span>
        <span class="value orange">0.01 ETH</span>
      </div>
    </div>

    <!-- Before connect -->
    <div id="beforeConnect">
      <button class="btn btn-connect" id="btnConnect" onclick="connectWallet()">
        <span>🦊</span> MetaMask 지갑 연결
      </button>
    </div>

    <!-- After connect -->
    <div id="afterConnect" class="hidden">
      <div class="wallet-section">
        <div class="wallet-addr">
          <span class="wallet-dot"></span>
          <span class="addr" id="walletAddr">-</span>
          <button class="copy-btn" onclick="copyAddress()" title="주소 복사">📋</button>
        </div>
        <div class="info-item">
          <span class="label"><span class="icon">👤</span> 내 잔액</span>
          <span class="value green" id="myBalance">- ETH</span>
        </div>
      </div>
      <button class="btn btn-request" id="btnRequest" onclick="requestTokens()">
        <span class="btn-icon">🚰</span> 0.01 ETH 요청하기
      </button>
      <button class="btn btn-disconnect" onclick="disconnectWallet()">연결 해제</button>
    </div>

    <div class="status" id="status"></div>
  </div>
  <p class="footer">Powered by Solidity Lab</p>
</div>

<script>
const REQUEST_AMOUNT = '0.01';
const FAUCET_ADDRESS = '0x97376CA8C43910323C3fBF6525E0B2a65Dc089f4';

let provider = null;
let signer = null;
let connectedAddress = null;

// ===== WALLET =====
async function connectWallet() {
  const btn = document.getElementById('btnConnect');
  if (typeof window.ethereum === 'undefined') {
    showStatus('error', '🦊 MetaMask가 설치되어 있지 않습니다. <a href="https://metamask.io" target="_blank" style="color:inherit;text-decoration:underline">설치하기</a>');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon" style="display:inline-block;animation:spin .8s linear infinite">⏳</span> 연결 중...';

  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    connectedAddress = accounts[0];

    document.getElementById('beforeConnect').classList.add('hidden');
    document.getElementById('afterConnect').classList.remove('hidden');
    document.getElementById('walletAddr').textContent = connectedAddress;

    await updateNetwork();
    await updateBalances();

    showStatus('success', '✅ 지갑이 연결되었습니다');

    // Listen for account/network changes
    window.ethereum.on('accountsChanged', handleAccountsChanged);
    window.ethereum.on('chainChanged', () => window.location.reload());
  } catch (err) {
    if (err.code === 4001) {
      showStatus('info', '연결이 취소되었습니다');
    } else {
      showStatus('error', `❌ 연결 실패: ${err.message}`);
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>🦊</span> MetaMask 지갑 연결';
  }
}

function disconnectWallet() {
  connectedAddress = null;
  document.getElementById('beforeConnect').classList.remove('hidden');
  document.getElementById('afterConnect').classList.add('hidden');
  document.getElementById('networkBadge').style.display = 'none';
  document.getElementById('faucetBalance').textContent = '- ETH';
  document.getElementById('status').className = 'status';
  document.getElementById('status').style.display = 'none';
}

function handleAccountsChanged(accounts) {
  if (accounts.length === 0) {
    disconnectWallet();
  } else {
    connectedAddress = accounts[0];
    document.getElementById('walletAddr').textContent = connectedAddress;
    updateBalances();
  }
}

// ===== NETWORK =====
async function updateNetwork() {
  try {
    const chainId = await window.ethereum.request({ method: 'eth_chainId' });
    const networks = {
      '0x1': 'Ethereum Mainnet',
      '0x5': 'Goerli Testnet',
      '0xaa36a7': 'Sepolia Testnet',
      '0x89': 'Polygon',
      '0x13881': 'Mumbai Testnet',
      '0x539': 'Localhost:8545',
      '0x7a69': 'Hardhat'
    };
    const name = networks[chainId] || `Chain ${parseInt(chainId, 16)}`;
    document.getElementById('networkName').textContent = name;
    document.getElementById('networkBadge').style.display = 'inline-flex';
  } catch (e) {
    console.error('Network error:', e);
  }
}

// ===== BALANCES =====
async function updateBalances() {
  try {
    // My balance
    if (connectedAddress) {
      const balHex = await window.ethereum.request({
        method: 'eth_getBalance',
        params: [connectedAddress, 'latest']
      });
      const balETH = parseInt(balHex, 16) / 1e18;
      document.getElementById('myBalance').textContent = balETH.toFixed(4) + ' ETH';
    }

    // Faucet balance (if contract deployed)
    if (FAUCET_ADDRESS !== '0x0000000000000000000000000000000000000000') {
      const faucetHex = await window.ethereum.request({
        method: 'eth_getBalance',
        params: [FAUCET_ADDRESS, 'latest']
      });
      const faucetETH = parseInt(faucetHex, 16) / 1e18;
      document.getElementById('faucetBalance').textContent = faucetETH.toFixed(4) + ' ETH';
    } else {
      document.getElementById('faucetBalance').textContent = '(컨트랙트 미배포)';
    }
  } catch (e) {
    console.error('Balance error:', e);
  }
}

// ===== REQUEST TOKENS =====
async function requestTokens() {
  const btn = document.getElementById('btnRequest');
  if (!connectedAddress) { showStatus('error', '지갑을 먼저 연결하세요'); return; }

  if (FAUCET_ADDRESS === '0x0000000000000000000000000000000000000000') {
    showStatus('info', 'ℹ️ Faucet 컨트랙트가 아직 배포되지 않았습니다. 컨트랙트 주소를 설정해주세요.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon" style="display:inline-block;animation:spin .8s linear infinite">⏳</span> 요청 처리 중...';

  try {
    // Call requestTokens() on the faucet contract
    // Function selector: keccak256("requestTokens()") = 0xd3541385 (first 4 bytes)
    const txHash = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: connectedAddress,
        to: FAUCET_ADDRESS,
        data: '0xd3541385', // requestTokens() selector
        gas: '0x186A0' // 100000
      }]
    });

    showStatus('success', `✅ 요청 성공! Tx: ${txHash.substring(0, 18)}...`);
    setTimeout(updateBalances, 3000);
  } catch (err) {
    if (err.code === 4001) {
      showStatus('info', '트랜잭션이 취소되었습니다');
    } else {
      showStatus('error', `❌ 요청 실패: ${err.message}`);
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="btn-icon">🚰</span> 0.01 ETH 요청하기';
  }
}

// ===== UTILS =====
function copyAddress() {
  if (connectedAddress) {
    navigator.clipboard.writeText(connectedAddress);
    showStatus('success', '📋 주소가 복사되었습니다');
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = `status ${type}`;
  el.innerHTML = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ===== AUTO-CONNECT =====
(async function() {
  if (typeof window.ethereum !== 'undefined') {
    try {
      const accounts = await window.ethereum.request({ method: 'eth_accounts' });
      if (accounts.length > 0) {
        connectedAddress = accounts[0];
        document.getElementById('beforeConnect').classList.add('hidden');
        document.getElementById('afterConnect').classList.remove('hidden');
        document.getElementById('walletAddr').textContent = connectedAddress;
        await updateNetwork();
        await updateBalances();
      }
    } catch (e) {}
  }
})();

// ===== PARTICLES =====
(function() {
  const canvas = document.getElementById('bg'), ctx = canvas.getContext('2d');
  let particles = [], visible = true;
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 40; i++) particles.push({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,
    r: Math.random()*1.5+.4, a: Math.random()*.3+.08,
    c: ['#00d4ff','#7c3aed','#10b981'][Math.floor(Math.random()*3)]
  });
  (function draw() {
    requestAnimationFrame(draw); if (!visible) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.c; ctx.globalAlpha = p.a; ctx.fill();
    });
    ctx.globalAlpha = 1;
  })();
  document.addEventListener('visibilitychange', () => { visible = !document.hidden; });
})();
</script>
</body>
</html>
